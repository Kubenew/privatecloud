# PrivateCloud HA Proxmox Configuration Example
#
# High Availability cluster with 3 masters and 2 workers
# using Proxmox VE for infrastructure

cluster_name: ha-proxmox-cluster
provider: proxmox
k3s_version: v1.30.0+k3s1
terraform_dir: ./ha-terraform

# High Availability settings
ha:
  enabled: true
  master_count: 3
  worker_count: 2
  db_type: embedded  # or: postgresql, etcd, mysql

# Proxmox Infrastructure
proxmox:
  url: https://proxmox.example.com:8006/api2/json
  token_id: root@pam!privatecloud
  token_secret: "${PROXMOX_TOKEN}"  # Set via environment variable
  node: proxmox-node-1
  template: ubuntu-2204-k3s
  storage: local-lvm
  bridge: vmbr0
  
  # Master VM specs (HA requires at least 2GB RAM each)
  master_count: 3
  master_cores: 2
  master_memory: 4096
  master_disk: 40G
  
  # Worker VM specs
  worker_count: 2
  worker_cores: 4
  worker_memory: 8192
  worker_disk: 80G

# Services to install
services:
  metallb: true
  ingress_nginx: true
  cert_manager: true
  monitoring: true
  longhorn: true

# Backup Configuration
backup:
  enabled: true
  schedule: daily
  keep_last: 7
  encrypt: true
  s3_bucket: ha-backups-proxmox  # Optional: upload to S3
  keep_last_longhorn: 5

# Network Settings
network:
  cluster_cidr: 10.42.0.0/16
  service_cidr: 10.43.0.0/16
  node_cidr: 192.168.1.0/24

# Advanced Options
advanced:
  disable: traefik  # Use ingress-nginx instead
  kube_proxy_mode: nft
  disable_network_policy: true
  etcd_backup_interval: 6h
  etcd_backup_retention: 24