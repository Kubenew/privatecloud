cluster_name: demo-private-cloud
provider: proxmox  # proxmox, hetzner, libvirt, vsphere, openstack

# Proxmox specific config (if provider=proxmox)
proxmox:
  url: https://proxmox.example.com:8006/api2/json
  node: pve-1
  storage: local-lvm

nodes:
  - host: 192.168.1.10
    user: root
    role: master
  - host: 192.168.1.11
    user: root
    role: worker

k3s_version: v1.29.0+k3s1

services:
  metallb: true
  ingress_nginx: true
  cert_manager: true
  monitoring: true
  longhorn: false  # or true for persistent storage