# PrivateCloud Full Stack Demo
# 
# This docker-compose.yml provides a complete demo environment
# showing the full PrivateCloud stack (without actual K3s).
#
# Run with: docker-compose up -d
#
# Access:
# - Traefik Dashboard: http://localhost:8090
# - Prometheus: http://localhost:9090
# - Grafana: http://localhost:3000 (admin/admin)
# - MinIO Console: http://localhost:9000 (minioadmin/minioadmin)
# - Whoami (demo service): http://localhost:8080

services:
  #traefik:
  #  image: traefik:v3.0
  #  container_name: privatecloud-traefik
  #  ports:
  #    - "80:80"
  #    - "8090:8080"
  #  volumes:
  #    - /var/run/docker.sock:/var/run/docker.sock:ro
  #    - ./traefik.yml:/traefik.yml:ro
  #  networks:
  #    - privatecloud

  whoami:
    image: traefik/whoami:v1.10.1
    container_name: privatecloud-whoami
    environment:
      - PORT=80
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=PathPrefix(`/whoami`)"
      - "traefik.http.routers.whoami.entrypoints=web"
    networks:
      - privatecloud

  prometheus:
    image: prom/prometheus:latest
    container_name: privatecloud-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - privatecloud

  grafana:
    image: grafana/grafana:latest
    container_name: privatecloud-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - privatecloud

  minio:
    image: minio/minio:latest
    container_name: privatecloud-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - privatecloud

  # Optional: K3s demo (requires more resources)
  # k3s-demo:
  #   image: rancher/k3s:latest
  #   privileged: true
  #   command: server --disable=traefik --write-kubeconfig-mode 644
  #   volumes:
  #     - k3s-data:/var/lib/rancher/k3s
  #   networks:
  #     - privatecloud

volumes:
  minio-data:
  #k3s-data:

networks:
  privatecloud:
    driver: bridge